<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cryptle-Medium</title>
  <link rel="icon" href="assets/crakkle.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/game_styles.css">
  <script src="scripts/game_logic.js" defer></script>
  <script src="scripts/game_visuals.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="game-container">
      <header class="toolbar-header">
        <section class="toolbar-section">
          <a class="back-button" href="index.html" aria-label="Back to home">
            <svg class="back-button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" />
            </svg>
          </a>
          <div class="toolbar-actions">
            <div class="how-to-modal">
              <button class="how-to-question-mark-button" id="how-to-question-mark-button" type="button" aria-label="Open how to modal"
                aria-haspopup="dialog" aria-expanded="false" aria-controls="how-to-dropdown">
                <img class="how-to-question-mark-icon" src="assets/question-mark.svg" alt="" aria-hidden="true">
              </button>
              <div class="how-to-dropdown hidden" id="how-to-dropdown" role="dialog" aria-modal="true" aria-labelledby="how-to-title" aria-hidden="true">
                <button class="settings-close-button" id="how-to-close-button" type="button" aria-label="Close how to modal">
                  <img class="settings-close-icon" src="assets/X.svg" alt="" aria-hidden="true">
                </button>
                <h2 id="how-to-title">How To Play</h2>
                <div class="modal-copy"></div>
                <p class="modal-intro">Guess the hidden word in 6 tries.</p>
                <section class="instruction-section" aria-labelledby="how-to-rules-title">
                  <h3 class="instruction-heading" id="how-to-rules-title">Rules</h3>
                  <ul class="instruction-list">
                    <li>The target word is a common English word with 5 letters.</li>
                    <li>After every guess, the computer gives feedback for each letter in your guess:</li>
                    <ul class="feedback-list">
                      <li><span class="instruction-letter-tile" data-state="correct" aria-hidden="true"></span> means the letter is in the word and in the correct position.</li>
                    </ul>
                  </ul>
                </section>
              </div>
            </div>
            <div class="settings-menu">
              <button class="settings-cog-button" id="settings-cog-button" type="button" aria-label="Open settings menu"
                aria-haspopup="dialog" aria-expanded="false" aria-controls="settings-dropdown">
                <img class="settings-cog-icon" src="assets/settings-cog.svg" alt="" aria-hidden="true">
              </button>
              <div class="settings-dropdown hidden" id="settings-dropdown" role="dialog" aria-modal="true" aria-labelledby="settings-title" aria-hidden="true">
                <button class="settings-close-button" id="settings-close-button" type="button" aria-label="Close settings menu">
                  <img class="settings-close-icon" src="assets/X.svg" alt="" aria-hidden="true">
                </button>
                <h2 id="settings-title">Settings</h2>
                <label class="settings-option" for="dark-mode-toggle">
                  <span>Dark mode</span>
                  <input id="dark-mode-toggle" type="checkbox">
                </label>
              </div>
            </div>
          </div>
        </section>
      </header>
      <main class="game-module">
        <div class="game-board-container">
          <div class="game-board">
            <div class="game-row" id="row-1">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
            </div>
            <div class="game-row" id="row-2">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
            </div>
            <div class="game-row" id="row-3">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
            </div>
            <div class="game-row" id="row-4">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
            </div>
            <div class="game-row" id="row-5">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
